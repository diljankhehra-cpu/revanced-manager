name: Build ReVanced Manager

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create gradle.properties with credentials
        run: |
          mkdir -p ~/.gradle
          echo "githubPackagesUsername=${{ secrets.GITHUB_PACKAGES_USERNAME }}" >> ~/.gradle/gradle.properties
          echo "githubPackagesPassword=${{ secrets.GITHUB_PACKAGES_PASSWORD }}" >> ~/.gradle/gradle.properties

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReVanced-Manager-APK
          path: app/build/outputs/apk/release/
