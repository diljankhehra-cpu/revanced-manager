name: Build ReVanced Manager

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          GITHUB_PACKAGES_USERNAME: ${{ secrets.GITHUB_PACKAGES_USERNAME }}
          GITHUB_PACKAGES_PASSWORD: ${{ secrets.GITHUB_PACKAGES_PASSWORD }}

      - name: Analyze Build Failure
        if: failure()
        run: |
          echo "--- ⚠️ BUILD FAILED - ANALYZING ERRORS ⚠️ ---"
          # 401 Error check (Custom check)
          echo "Checking logs for 401 errors..."
          # Running a custom grep on the output
          if ./gradlew assembleRelease --stacktrace 2>&1 | grep -q "401"; then
            echo "💡 SOLUTION: 401 Unauthorized detected. Your GITHUB_PACKAGES_PASSWORD token is invalid or lacks 'read:packages' permission."
          fi
          
          # Dependency resolution check
          if ./gradlew assembleRelease --stacktrace 2>&1 | grep -q "Could not resolve"; then
            echo "💡 SOLUTION: Dependency not found. Check if your repository needs VPN or if the dependency version exists in your registries."
          fi
          
          echo "--- SHOWING TOP ERRORS ---"
          ./gradlew assembleRelease --stacktrace | head -n 50

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ReVanced-Manager-APK
          path: app/build/outputs/apk/release/
